name: ziffa

services:
  # ----- Base de données -----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ----- Back-office Strapi (CMS) -----
  cms:
    build: ./cms
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_SSL: "false"
      NODE_ENV: production
      URL: https://${ADMIN_DOMAIN}
    volumes:
      - uploads:/opt/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, web]

  # ----- Frontend Astro (site public, SSR) -----
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # URL interne pour les requêtes serveur -> Strapi (réseau Docker)
      STRAPI_INTERNAL_URL: http://cms:1337
      # URL publique pour construire les liens vers les médias
      PUBLIC_STRAPI_URL: https://${ADMIN_DOMAIN}
      HOST: 0.0.0.0
      PORT: "4321"
    depends_on:
      - cms
    networks: [internal, web]

  # ----- Reverse proxy interne (mode "tout-en-un" / local uniquement) -----
  # Sur le serveur, un Caddy PARTAGÉ (projet "proxy") gère déjà 80/443.
  # Ce service n'est donc PAS démarré par défaut (profil "standalone").
  # Pour l'activer en local : docker compose --profile standalone up
  caddy:
    image: caddy:2-alpine
    profiles: ["standalone"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - cms
    networks: [internal]

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  # Réseau partagé du reverse proxy (créé par le projet "proxy").
  web:
    external: true
